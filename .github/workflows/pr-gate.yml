# Single gate that waits for ALL other workflow jobs to complete.
# This is the ONE required check in the branch ruleset.
name: PR Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    # Skip the gate for hotfix/emergency branches — no one hunts for coverage during a fire.
    # A skipped job counts as passing for the required status check in the branch ruleset.
    if: "!startsWith(github.head_ref, 'hotfix/') && !startsWith(github.head_ref, 'emergency/') && !startsWith(github.event.pull_request.title, 'emergency/')"
    steps:
      - uses: Wandalen/wretry.action@v3.8.0
        with:
          action: kachick/wait-other-jobs@v3
          attempt_limit: 3
          attempt_delay: 30000
          with: |
            skip-same-workflow: true
            skip-list: |
              [
                {
                  "workflowFile": "claude-code-review.yml",
                  "jobName": "claude-review",
                  "jobMatchMode": "prefix"
                }
              ]
